<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cognia - Prueba</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
  <header class="topbar">
    <div class="container topbar__inner">
      <h1 class="brand">Cognia</h1>
      <p class="brand__sub">Prueba del día</p>
    </div>
  </header>

  <main class="container">
    <section class="card" aria-labelledby="tituloPrueba">
      <h2 id="tituloPrueba">Prueba cognitiva</h2>

      <!-- Mensajes grandes (ya hiciste la prueba / guardando / error...) -->
      <div id="msg" class="msg" role="status" aria-live="polite"></div>

      <!-- Indicador de progreso -->
      <div class="progressLine" id="progressLine">
        Bloque <span id="blockNum">1</span> / 3 · Pregunta <span id="questionNum">1</span> de <span id="questionTotal">10</span>
      </div>

      <!-- Enunciado del bloque -->
      <div class="blockTitle" id="blockTitle">Cargando...</div>

      <!-- Zona principal donde se pinta la pregunta -->
      <div id="questionArea" class="questionArea"></div>

      <!-- Feedback inmediato -->
      <div id="feedback" class="feedback" aria-live="polite"></div>

      <!-- Botonera inferior -->
      <div class="row row--end">
        <button id="nextBtn" class="btn btn-primary" disabled>Siguiente</button>
      </div>

      <div class="row">
        <button id="backProfileBtn" class="btn btn-secondary">Volver al perfil</button>
      </div>
    </section>

    <footer class="footer">
      <p>Consejo: tómate tu tiempo. Solo aparece una pregunta cada vez.</p>
    </footer>
  </main>

  <script type="module" src="./js/test.js"></script>
</body>
</html>
