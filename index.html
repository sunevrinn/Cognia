<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cognia - Acceso</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
  <!-- Cabecera simple y muy clara -->
  <header class="topbar">
    <div class="container topbar__inner">
      <h1 class="brand">Cognia</h1>
      <p class="brand__sub">Estimulación cognitiva (demo)</p>
    </div>
  </header>

  <main class="container">
    <!-- Zona de mensajes (éxito / error). aria-live ayuda a lectores de pantalla -->
    <div id="msg" class="msg" role="status" aria-live="polite"></div>

    <!-- PANTALLA INICIAL: elegir entre login o registro -->
    <section id="welcomeSection" class="card" aria-labelledby="tituloAcceso">
      <h2 id="tituloAcceso">Bienvenido a Cognia</h2>
      <p style="text-align: center; font-size: 1.1rem; margin-bottom: 2rem;">¿Qué deseas hacer?</p>
      
      <div class="grid-2">
        <button id="goLoginBtn" class="btn btn-primary" style="font-size: 1.1rem; padding: 1rem;">
          Iniciar sesión
        </button>
        <button id="goRegisterBtn" class="btn btn-secondary" style="font-size: 1.1rem; padding: 1rem;">
          Crear cuenta
        </button>
      </div>
    </section>

    <!-- FORMULARIO LOGIN -->
    <section id="loginSection" class="card" aria-labelledby="tituloLogin" style="display: none;">
      <h2 id="tituloLogin">Iniciar sesión</h2>

      <div class="panel">
        <form id="loginForm" class="form" autocomplete="on">
          <label class="label" for="loginEmail">Email</label>
          <input id="loginEmail" class="input" type="email" required placeholder="tu@email.com" />

          <label class="label" for="loginPass">Contraseña</label>
          <input id="loginPass" class="input" type="password" required minlength="6" placeholder="Mínimo 6 caracteres" />

          <div class="row">
            <button class="btn btn-primary" type="submit">Entrar</button>
            <button id="backFromLoginBtn" class="btn btn-secondary" type="button">Atrás</button>
          </div>
        </form>
      </div>
    </section>

    <!-- FORMULARIO REGISTRO -->
    <section id="registerSection" class="card" aria-labelledby="tituloRegister" style="display: none;">
      <h2 id="tituloRegister">Crear cuenta</h2>

      <div class="panel">
        <form id="registerForm" class="form" autocomplete="on">
          <label class="label" for="regEmail">Email</label>
          <input id="regEmail" class="input" type="email" required placeholder="tu@email.com" />

          <label class="label" for="regPass">Contraseña</label>
          <input id="regPass" class="input" type="password" required minlength="6" placeholder="Mínimo 6 caracteres" />

          <label class="label" for="regGender">Género</label>
          <select id="regGender" class="input" required>
            <option value="hombre">Hombre</option>
            <option value="mujer">Mujer</option>
            <option value="prefiereNoDecir">Prefiere no decirlo</option>
          </select>

          <label class="label" for="regBirth">Fecha de nacimiento</label>
          <input id="regBirth" class="input" type="date" required />

          <label class="label" for="regLevel">Nivel inicial</label>
          <select id="regLevel" class="input" required>
            <option value="facil">Fácil</option>
            <option value="medio">Medio</option>
            <option value="dificil">Difícil</option>
          </select>

          <div class="row">
            <button class="btn btn-primary" type="submit">Crear cuenta</button>
            <button id="backFromRegisterBtn" class="btn btn-secondary" type="button">Atrás</button>
          </div>
        </form>
      </div>

      <div class="hint">
        <p><strong>Consejo:</strong> Usa un email real (aunque sea de prueba) y una contraseña de mínimo 6 caracteres.</p>
      </div>
    </section>

    <footer class="footer">
      <p>© Cognia (demo) · Diseño inclusivo para personas mayores</p>
    </footer>
  </main>

  <!-- Importante: usamos ES Modules -->
  <script type="module" src="./js/auth.js"></script>
</body>
</html>
